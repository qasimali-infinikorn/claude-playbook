<text x="340" y="434" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#085041">TASKS.md</text>

<line x1="340" y1="452" x2="340" y2="472" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="200" y="476" width="280" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="496" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">6. Frontend design</text>
<text x="340" y="514" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#712B13">Built components and pages</text>

