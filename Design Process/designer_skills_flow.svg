<text x="188" y="584" text-anchor="end" font-family="sans-serif" font-size="12" fill="#5F5E5A">critique</text>

<text x="340" y="650" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">Each phase confirms before advancing. Designer can skip or stop at any point.</text>
<text x="340" y="668" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">Design review runs separately when you have something built.</text>

<rect x="114" y="700" width="16" height="16" rx="4" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
