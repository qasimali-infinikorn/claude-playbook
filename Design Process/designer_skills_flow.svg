<text x="340" y="336" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">4. Design tokens</text>
<text x="340" y="354" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489">tokens.css / tailwind config</text>

