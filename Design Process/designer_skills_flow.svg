<text x="356" y="546" font-family="sans-serif" font-size="11" fill="#999">on request</text>

<rect x="200" y="556" width="280" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5" stroke-dasharray="4 4"/>
<text x="340" y="576" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#173404">7. Design review</text>
<text x="340" y="594" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#27500A">DESIGN_REVIEW.md</text>

